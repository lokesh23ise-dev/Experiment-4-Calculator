<!DOCTYPE html>
<html>
<head>
    <title>API Calculator - Full Expression</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #121212; color: white; }
        .calc-box { background: #1e1e1e; padding: 25px; border-radius: 20px; width: 320px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid #333; }
        
        /* The Display Area */
        .screen { background: #252525; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: right; border: 1px solid #444; }
        #expression { color: #888; font-size: 14px; min-height: 20px; margin-bottom: 5px; }
        #display { color: #0f0; font-size: 32px; font-weight: bold; overflow: hidden; }

        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        button { padding: 20px; font-size: 20px; cursor: pointer; background: #333; color: white; border: none; border-radius: 10px; transition: 0.1s; }
        button:hover { background: #444; }
        .operator { color: #ff9500; font-weight: bold; background: #2a2a2a; }
        .equal { background: #ff9500; color: white; grid-column: span 4; margin-top: 10px; font-weight: bold; }
        .equal:hover { background: #e68600; }
    </style>
</head>
<body>
    <div class="calc-box">
        <div class="screen">
            <div id="expression"></div> <div id="display">0</div>    </div>
        
        <div class="buttons">
            <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button><button class="operator" onclick="setOp('div', '/')">/</button>
            <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button><button class="operator" onclick="setOp('mul', '*')">*</button>
            <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button><button class="operator" onclick="setOp('sub', '-')">-</button>
            <button onclick="clearCalc()">C</button><button onclick="press('0')">0</button><button onclick="press('.')">.</button><button class="operator" onclick="setOp('add', '+')">+</button>
            <button class="equal" onclick="sendToAPI()">CALCULATE (Enter)</button>
        </div>
    </div>

    <script>
        let currentNum = ''; 
        let prevNum = ''; 
        let operation = '';
        let opSymbol = '';

        const displayDiv = document.getElementById('display');
        const expressionDiv = document.getElementById('expression');

        function press(num) { 
            currentNum += num; 
            displayDiv.innerText = currentNum;
            updateExpression();
        }

        function setOp(op, symbol) { 
            if (currentNum === '' && prevNum === '') return;
            if (currentNum !== '') {
                prevNum = currentNum;
                currentNum = '';
            }
            operation = op;
            opSymbol = symbol;
            updateExpression();
            displayDiv.innerText = '0';
        }

        function updateExpression() {
            expressionDiv.innerText = `${prevNum} ${opSymbol} ${currentNum}`;
        }

        function clearCalc() { 
            currentNum = ''; prevNum = ''; operation = ''; opSymbol = '';
            displayDiv.innerText = '0'; 
            expressionDiv.innerText = '';
        }

        async function sendToAPI() {
            if (!prevNum || !currentNum || !operation) return;
            
            try {
                const response = await fetch('/calculate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ num1: prevNum, num2: currentNum, operation: operation })
                });
                const data = await response.json();
                
                // Show final result
                displayDiv.innerText = data.result;
                expressionDiv.innerText = `${prevNum} ${opSymbol} ${currentNum} =`;
                
                // Prepare for next calculation
                currentNum = data.result.toString();
                prevNum = '';
                operation = '';
                opSymbol = '';
            } catch (err) {
                displayDiv.innerText = "Error";
            }
        }

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if (/[0-9.]/.test(e.key)) press(e.key);
            else if (e.key === '+') setOp('add', '+');
            else if (e.key === '-') setOp('sub', '-');
            else if (e.key === '*') setOp('mul', '*');
            else if (e.key === '/') { setOp('div', '/'); e.preventDefault(); }
            else if (e.key === 'Enter') sendToAPI();
            else if (e.key === 'Escape') clearCalc();
        });
    </script>
</body>
</html>
